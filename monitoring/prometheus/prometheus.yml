global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: ridebook-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:8001
          - driver-service:8002
          - ride-matching-service:8003
          - payment-service:8004
          - notification-service:8005
          - pricing-service:8006
