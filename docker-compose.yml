version: '3.8'

networks:
  ridebook-network:
    driver: bridge

volumes:
  user-db-data:
  payment-db-data:
  driver-db-data:
  notification-db-data:
  ride-redis-data:
  pricing-redis-data:
  grafana-data:

services:

  # =====================
  # DATABASES
  # =====================

  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: userdb
    ports:
      - "3307:3306"   # TablePlus → localhost:3307
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: paymentdb
    ports:
      - "3308:3306"   # TablePlus → localhost:3308
    volumes:
      - payment-db-data:/var/lib/mysql
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  driver-db:
    image: mongo:7.0
    container_name: driver-db
    restart: unless-stopped
    ports:
      - "27017:27017"   # TablePlus → localhost:27017
    volumes:
      - driver-db-data:/data/db
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: mongo:7.0
    container_name: notification-db
    restart: unless-stopped
    ports:
      - "27018:27017"   # TablePlus → localhost:27018
    volumes:
      - notification-db-data:/data/db
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  ride-redis:
    image: redis:7.2-alpine
    container_name: ride-redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # TablePlus → localhost:6379
    volumes:
      - ride-redis-data:/data
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pricing-redis:
    image: redis:7.2-alpine
    container_name: pricing-redis
    restart: unless-stopped
    ports:
      - "6380:6379"   # TablePlus → localhost:6380
    volumes:
      - pricing-redis-data:/data
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ridebook-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ridebook-network

  # =====================
  # DATABASE GUI TOOLS
  # =====================

  # phpMyAdmin — View BOTH MySQL databases (user-db + payment-db)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "9001:80"
    environment:
      PMA_HOSTS: user-db,payment-db          # connects to both MySQL DBs
      PMA_USER: root
      PMA_PASSWORD: password
      UPLOAD_LIMIT: 100M
    depends_on:
      user-db:
        condition: service_healthy
      payment-db:
        condition: service_healthy
    networks:
      - ridebook-network

  # Mongo Express — View driver-db (MongoDB)
  mongo-express-driver:
    image: mongo-express:latest
    container_name: mongo-express-driver
    restart: unless-stopped
    ports:
      - "9002:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: driver-db
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      driver-db:
        condition: service_healthy
    networks:
      - ridebook-network

  # Mongo Express — View notification-db (MongoDB)
  mongo-express-notification:
    image: mongo-express:latest
    container_name: mongo-express-notification
    restart: unless-stopped
    ports:
      - "9003:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: notification-db
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      notification-db:
        condition: service_healthy
    networks:
      - ridebook-network

  # RedisInsight — View BOTH Redis instances
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "9004:5540"
    networks:
      - ridebook-network

  # =====================
  # MICROSERVICES
  # =====================

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      DB_HOST: user-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: userdb
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  driver-service:
    build:
      context: .
      dockerfile: driver-service/Dockerfile
    container_name: driver-service
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://driver-db:27017/driverdb
    depends_on:
      driver-db:
        condition: service_healthy
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  pricing-service:
    build:
      context: .
      dockerfile: pricing-service/Dockerfile
    container_name: pricing-service
    restart: unless-stopped
    environment:
      REDIS_HOST: pricing-redis
      REDIS_PORT: 6379
    depends_on:
      pricing-redis:
        condition: service_healthy
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  ride-matching-service:
    build:
      context: .
      dockerfile: ride-matching-service/Dockerfile
    container_name: ride-matching-service
    restart: unless-stopped
    environment:
      REDIS_HOST: ride-redis
      REDIS_PORT: 6379
      DRIVER_SERVICE_GRPC: driver-service:50052
      PRICING_SERVICE_GRPC: pricing-service:50053
    depends_on:
      ride-redis:
        condition: service_healthy
      driver-service:
        condition: service_started
      pricing-service:
        condition: service_started
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://notification-db:27017/notificationdb
    depends_on:
      notification-db:
        condition: service_healthy
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      DB_HOST: payment-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: paymentdb
      RIDE_SERVICE_GRPC: ride-matching-service:50051
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
    depends_on:
      payment-db:
        condition: service_healthy
      ride-matching-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - ridebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =====================
  # FRONTEND
  # =====================

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - ridebook-network

  # =====================
  # API GATEWAY
  # =====================

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - driver-service
      - ride-matching-service
      - payment-service
      - notification-service
      - pricing-service
      - frontend
    networks:
      - ridebook-network
